<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FC466B"/>
      <stop offset="100%" stop-color="#3F5EFB"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="72" cy="72" r="56" fill="rgba(255,255,255,0.15)"/>
  <circle cx="440" cy="440" r="72" fill="rgba(255,255,255,0.12)"/>
  <circle cx="440" cy="72" r="36" fill="rgba(255,255,255,0.14)"/>

  <!-- Main white card -->
  <rect x="60" y="88" width="392" height="336" rx="48" fill="white" opacity="0.96"/>

  <!-- Large multiplication symbol (pink) -->
  <text
    x="256" y="248"
    font-family="Arial Black, Impact, Arial, sans-serif"
    font-size="220"
    font-weight="900"
    fill="#FC466B"
    text-anchor="middle"
    dominant-baseline="middle">×</text>

  <!-- Division symbol below (blue, smaller) -->
  <text
    x="256" y="376"
    font-family="Arial Black, Impact, Arial, sans-serif"
    font-size="88"
    font-weight="900"
    fill="#3F5EFB"
    text-anchor="middle"
    dominant-baseline="middle"
    opacity="0.7">÷</text>

  <!-- Yellow star top-left (5-point polygon) -->
  <polygon
    points="72,30 79,52 103,52 84,66 91,88 72,74 53,88 60,66 41,52 65,52"
    fill="#FFE66D"/>

  <!-- Smaller teal star bottom-right -->
  <polygon
    points="432,424 437,440 453,440 441,450 446,466 432,456 418,466 423,450 411,440 427,440"
    fill="#4ECDC4"
    opacity="0.9"/>
</svg>
